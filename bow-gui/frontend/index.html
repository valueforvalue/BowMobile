<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bow - Parts Cross-Reference</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; }
        .row-selected { background-color: #fef9c3 !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <img src="assets/logo.png" alt="Bow Logo" class="mx-auto max-w-[280px] h-auto border border-gray-200 rounded-lg shadow-sm">
        </div>

        <!-- Search Box -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8 border border-gray-100">
            <form id="search-form" class="flex flex-col md:flex-row gap-4">
                <input 
                    type="text" 
                    id="query" 
                    placeholder="Search by part number (e.g. FM2-A087-020) or description (e.g. Roller)..." 
                    class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg"
                    autofocus
                >
                <div class="flex gap-2">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg shadow-sm">
                        Search
                    </button>
                    <button type="button" onclick="printSelected()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition-colors text-lg shadow-sm">
                        Print Selected
                    </button>
                    <button type="button" onclick="showModels()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg transition-colors text-lg shadow-sm">
                        Show Models
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Area -->
        <div id="results-container">
            <div class="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300">
                <p class="text-gray-500 text-xl font-medium">Enter a search term above to begin.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-20 pb-10 text-center text-gray-400 text-xs border-t border-gray-200 pt-8">
            <p>Bow Copier Parts Cross-Reference v1.1.1</p>
            <p class="mt-1">&copy; 2026</p>
        </div>
    </div>

    <script>
        document.getElementById('search-form').onsubmit = function(e) {
            e.preventDefault();
            const q = document.getElementById('query').value;
            window.go.main.App.Search(q).then(result => {
                document.getElementById('results-container').innerHTML = result;
            });
            return false;
        };

        function showModels() {
            window.go.main.App.GetModels().then(result => {
                document.getElementById('results-container').innerHTML = result;
            });
        }

        function toggleRowHighlight(checkbox) {
            const row = checkbox.closest('tr');
            if (checkbox.checked) {
                row.classList.add('row-selected');
            } else {
                row.classList.remove('row-selected');
            }
        }

        function printSelected() {
            const selectedRows = document.querySelectorAll('.part-checkbox:checked');
            if (selectedRows.length === 0) {
                alert('Please select at least one part to print.');
                return;
            }

            const printWindow = window.open('', '_blank');
            let content = "<html><head><title>Parts List Selection</title>";
            content += "<style>body { font-family: sans-serif; padding: 40px; } h1 { text-align: center; color: #333; } table { width: 100%; border-collapse: collapse; margin-top: 20px; } th, td { border: 1px solid #ddd; padding: 12px; text-align: left; } th { background-color: #f2f2f2; }</style>";
            content += "</head><body><h1>Selected Parts List</h1><table><thead><tr><th>Base Part</th><th>Description</th><th>Model / Series</th><th>Figure</th><th>Key No</th><th>Full Part Number</th><th>Remarks</th></tr></thead><tbody>";

            selectedRows.forEach(cb => {
                const row = cb.closest('tr');
                const card = row.closest('.result-card');
                const header = card.querySelector('h2');
                
                const basePart = header.getAttribute('data-basepart');
                const description = header.getAttribute('data-description');
                
                const cells = row.querySelectorAll('td');
                content += "<tr>";
                content += "<td>" + basePart + "</td>";
                content += "<td>" + description + "</td>";
                content += "<td>" + cells[1].innerText + "</td>";
                content += "<td>" + cells[3].innerText + "</td>";
                content += "<td>" + cells[4].innerText + "</td>";
                content += "<td>" + cells[5].innerText + "</td>";
                content += "<td>" + cells[6].innerText + "</td>";
                content += "</tr>";
            });

            content += "</tbody></table>";
            content += "<script>window.onload = function() { window.print(); window.close(); }<\/script>";
            content += "</body></html>";

            printWindow.document.write(content);
            printWindow.document.close();
        }
    </script>
</body>
</html>
